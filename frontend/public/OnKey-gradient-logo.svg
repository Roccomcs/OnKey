<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueToPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e5fdb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Círculo con gradiente -->
  <circle cx="100" cy="100" r="95" fill="url(#blueToPurple)" stroke="none"/>
  <!-- Letra "K" en blanco -->
  <text x="100" y="120" font-family="Arial, sans-serif" font-size="90" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">K</text>
</svg>
